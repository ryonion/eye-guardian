name: Build AutoHotkey v2 Executable

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install AutoHotkey
        shell: pwsh
        run: |
          choco install autohotkey.install --yes --params "'/DefaultVer:U64'"

      - name: Compile script
        shell: pwsh
        run: |
          $searchRoots = @(
            (Join-Path $env:ProgramFiles "AutoHotkey"),
            (Join-Path ${env:ProgramFiles(x86)} "AutoHotkey"),
            (Join-Path $env:LOCALAPPDATA "Programs\AutoHotkey"),
            "C:\ProgramData\chocolatey\lib"
          ) | Where-Object { $_ -and (Test-Path $_) }

          $compiler = $null
          $base = $null

          foreach ($root in $searchRoots) {
            if (-not $compiler) {
              $compiler = Get-ChildItem -Path $root -Filter Ahk2Exe.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
            }
            if (-not $base) {
              $base = Get-ChildItem -Path $root -Filter AutoHotkey64.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
            }
          }

          $out = "EyesGuardian-x64.exe"

          if (-not $compiler) {
            throw "Ahk2Exe.exe not found under: $($searchRoots -join ', ')"
          }
          if (-not $base) {
            throw "AutoHotkey64.exe not found under: $($searchRoots -join ', ')"
          }

          & $compiler `
            /in EyesGuardian.ahk `
            /out $out `
            /base $base `
            /icon icon.ico

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ahk-x64
          path: EyesGuardian-x64.exe

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: EyesGuardian-x64.exe
