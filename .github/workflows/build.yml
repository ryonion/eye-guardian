name: Build AutoHotkey v2 Executable

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build with AutoHotkey Action
        uses: nukdokplex/autohotkey-build@v1
        with:
          version: v2.0.21
          x64: true
          x86: false
          x64_suffix: -x64
          in: EyesGuardian.ahk
          out: build
          icon: icon.ico

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eyes-guardian-x64
          path: build/EyesGuardian-x64.exe

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/EyesGuardian-x64.exe
